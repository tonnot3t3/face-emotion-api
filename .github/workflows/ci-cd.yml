name: CI/CD - Test and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # รัน manual ได้

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Unit tests (รันบน push ทุกครั้ง รวมถึง PR)
  # ===========================================================================
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app scripts tests || true   # warning only, ไม่ block CI

      - name: Build ONNX model (cache-friendly)
        run: |
          python -m scripts.convert_to_onnx
          python -m scripts.quantize

      - name: Run pytest
        run: pytest -v --tb=short

      - name: Upload model artifacts (สำหรับ debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onnx-models
          path: models/*.onnx
          retention-days: 3

  # ===========================================================================
  # Job 2: Deploy to Hugging Face Spaces (รันเฉพาะ push main และ test ผ่าน)
  # ===========================================================================
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 10

    steps:
      - name: Checkout (full history สำหรับ git push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface-hub
        run: pip install huggingface-hub==0.27.0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "::error::ต้อง set secrets: HF_TOKEN, HF_USERNAME, HF_SPACE_NAME ใน GitHub repo settings"
            exit 1
          fi

          # ตั้งค่า git
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone Space repo
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} hf-space

          # Copy ไฟล์ทั้งหมด (ยกเว้น .git ของเรา)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='hf-space' \
            --exclude='models/*.onnx' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='tests' \
            --exclude='jmeter' \
            --exclude='.hf-space-readme.md' \
            ./ hf-space/

          # ใช้ HF Spaces README (มี frontmatter ที่ Spaces ต้องการ) แทน README หลักของ repo
          cp .hf-space-readme.md hf-space/README.md

          # Commit + push (ต้องอยู่ใน hf-space directory เพื่อ commit ลง HF Space repo)
          cd hf-space
          git add -A
          git commit -m "Auto-deploy from GitHub Actions: ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push origin main

      - name: Print Space URL
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          echo "🚀 Deployed to: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          echo "📡 API URL: https://${HF_USERNAME}-${HF_SPACE_NAME}.hf.space"
