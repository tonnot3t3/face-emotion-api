<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Emotion Classifier</title>
<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --card-2: #1a2235;
        --border: #334155;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --success: #10b981;
        --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }
    .container {
        max-width: 860px;
        width: 100%;
    }
    header { text-align: center; margin-bottom: 32px; }
    header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
    }
    header p { color: var(--text-muted); font-size: 14px; }
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
    }
    .dropzone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
        display: block;
    }
    .dropzone:hover, .dropzone.dragover {
        border-color: var(--primary);
        background: rgba(99, 102, 241, 0.05);
    }
    .dropzone-icon { font-size: 48px; margin-bottom: 12px; }
    .dropzone-text { color: var(--text-muted); font-size: 14px; }
    .dropzone-text strong { color: var(--text); }
    #fileInput { display: none; }

    /* Selected files thumbnails */
    .thumbs {
        display: none;
        margin-top: 16px;
        flex-wrap: wrap;
        gap: 10px;
    }
    .thumbs.show { display: flex; }
    .thumb {
        position: relative;
        width: 92px;
        height: 92px;
        border-radius: 10px;
        border: 1px solid var(--border);
        overflow: hidden;
        background: #0b1224;
    }
    .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .thumb .remove {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(0,0,0,0.65);
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 14px;
        line-height: 22px;
        padding: 0;
        text-align: center;
    }
    .thumb .remove:hover { background: var(--error); }
    .files-meta {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-muted);
    }

    .button-row { display: flex; gap: 8px; margin-top: 16px; }
    button {
        flex: 1;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease;
        font-family: inherit;
    }
    .btn-primary {
        background: var(--primary);
        color: white;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }

    /* ===== Per-image result cards ===== */
    #resultsHeader {
        display: none;
        align-items: center;
        justify-content: space-between;
        margin: 24px 4px 12px;
    }
    #resultsHeader.show { display: flex; }
    #resultsHeader h2 {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.3px;
    }
    #resultsHeader .summary {
        font-size: 12px;
        color: var(--text-muted);
    }

    .results-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
    }
    @media (min-width: 720px) {
        .results-grid { grid-template-columns: 1fr 1fr; }
    }

    .result-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }
    .result-img-wrap {
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #0b1224;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-bottom: 1px solid var(--border);
    }
    .result-img-wrap img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
    }
    .result-body { padding: 16px 18px 18px; }
    .result-filename {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 12px;
        word-break: break-all;
    }

    /* Top label block */
    .top-result {
        text-align: center;
        padding: 14px 12px;
        background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(192,132,252,0.15) 100%);
        border-radius: 12px;
        margin-bottom: 14px;
    }
    .top-result.no-face {
        background: linear-gradient(135deg, rgba(239,68,68,0.18) 0%, rgba(239,68,68,0.08) 100%);
    }
    .top-emoji { font-size: 48px; margin-bottom: 6px; line-height: 1; }
    .top-label {
        font-size: 20px;
        font-weight: 700;
        text-transform: capitalize;
    }
    .top-confidence {
        color: var(--text-muted);
        margin-top: 4px;
        font-size: 13px;
    }
    .top-result.no-face .top-label { color: var(--error); text-transform: none; }

    .scores h3 {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .score-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
    }
    .score-emoji { font-size: 18px; width: 24px; text-align: center; }
    .score-label {
        width: 70px;
        font-size: 12px;
        text-transform: capitalize;
    }
    .score-bar {
        flex: 1;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
    }
    .score-bar-fill {
        height: 100%;
        background: var(--primary);
        border-radius: 4px;
        transition: width 0.4s ease;
    }
    .score-value {
        font-size: 12px;
        color: var(--text-muted);
        width: 48px;
        text-align: right;
        font-variant-numeric: tabular-nums;
    }
    .meta {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text-muted);
    }

    /* Loading / status states */
    .status-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 24px;
        color: var(--text-muted);
        font-size: 13px;
    }
    .status-row .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.18);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    .status-row.error { color: var(--error); }

    .error-msg {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--error);
        color: var(--error);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-top: 12px;
    }
    .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
        text-align: center;
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
    }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>🎭 Face Emotion Classifier</h1>
        <p>อัปโหลดรูปใบหน้าได้หลายรูปพร้อมกัน เพื่อให้โมเดล ViT ทำนายอารมณ์</p>
    </header>

    <div class="card">
        <label for="fileInput" class="dropzone" id="dropzone">
            <div class="dropzone-icon">📤</div>
            <div class="dropzone-text">
                <strong>คลิกเพื่อเลือกรูป (เลือกได้หลายรูป)</strong> หรือลากและวางที่นี่<br>
                รองรับ JPG, PNG, WebP (ไม่เกิน 5 MB ต่อรูป)
            </div>
        </label>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple>

        <div class="thumbs" id="thumbs"></div>
        <div class="files-meta" id="filesMeta"></div>

        <div class="button-row" id="buttonRow" style="display:none;">
            <button class="btn-secondary" id="resetBtn">รีเซ็ต</button>
            <button class="btn-primary" id="predictBtn">วิเคราะห์อารมณ์</button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div id="resultsHeader">
        <h2>ผลลัพธ์</h2>
        <span class="summary" id="resultsSummary"></span>
    </div>
    <div class="results-grid" id="resultsGrid"></div>

    <footer>
        Powered by ONNX-quantized ViT (<a href="https://huggingface.co/trpakov/vit-face-expression" target="_blank">trpakov/vit-face-expression</a>)
        + OpenCV face detection<br>
        ดู API docs ที่ <a href="/docs">/docs</a>
    </footer>
</div>

<script>
const EMOJI_MAP = {
    angry: '😠', disgust: '🤢', fear: '😨',
    happy: '😊', neutral: '😐', sad: '😢', surprise: '😲'
};
const MAX_FILE_BYTES = 5 * 1024 * 1024; // 5 MB
const ALLOWED_MIME = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];

const fileInput   = document.getElementById('fileInput');
const dropzone    = document.getElementById('dropzone');
const thumbsEl    = document.getElementById('thumbs');
const filesMeta   = document.getElementById('filesMeta');
const buttonRow   = document.getElementById('buttonRow');
const predictBtn  = document.getElementById('predictBtn');
const resetBtn    = document.getElementById('resetBtn');
const errorMsg    = document.getElementById('errorMsg');
const resultsHdr  = document.getElementById('resultsHeader');
const resultsSum  = document.getElementById('resultsSummary');
const resultsGrid = document.getElementById('resultsGrid');

// internal state
let selectedFiles = [];           // File[]
let dataUrlCache = new WeakMap(); // File -> dataURL string

// ===== Drag & drop =====
['dragenter', 'dragover'].forEach(evt =>
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); })
);
['dragleave', 'drop'].forEach(evt =>
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); })
);
dropzone.addEventListener('drop', e => {
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
        addFiles(Array.from(e.dataTransfer.files));
    }
});
fileInput.addEventListener('change', e => {
    if (e.target.files && e.target.files.length) {
        addFiles(Array.from(e.target.files));
    }
});

// ===== File management =====
function addFiles(newFiles) {
    hideError();
    const valid = [];
    const issues = [];
    newFiles.forEach(f => {
        if (!ALLOWED_MIME.includes(f.type)) {
            issues.push(`${f.name}: ชนิดไฟล์ไม่รองรับ`);
            return;
        }
        if (f.size > MAX_FILE_BYTES) {
            issues.push(`${f.name}: ขนาดเกิน 5 MB`);
            return;
        }
        // de-dup โดยใช้ name+size+lastModified
        const key = `${f.name}|${f.size}|${f.lastModified}`;
        const exists = selectedFiles.some(s => `${s.name}|${s.size}|${s.lastModified}` === key);
        if (!exists) valid.push(f);
    });
    if (issues.length) showError(issues.join(' · '));
    selectedFiles = selectedFiles.concat(valid);
    // เคลียร์ value ของ input เพื่อให้เลือกไฟล์เดิมซ้ำได้
    fileInput.value = '';
    renderThumbs();
}

function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderThumbs();
}

function renderThumbs() {
    thumbsEl.innerHTML = '';
    if (selectedFiles.length === 0) {
        thumbsEl.classList.remove('show');
        filesMeta.textContent = '';
        buttonRow.style.display = 'none';
        return;
    }
    thumbsEl.classList.add('show');
    selectedFiles.forEach((f, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'thumb';
        const img = document.createElement('img');
        // ใช้ cache เพื่อไม่ต้อง re-read FileReader
        if (dataUrlCache.has(f)) {
            img.src = dataUrlCache.get(f);
        } else {
            const reader = new FileReader();
            reader.onload = e => {
                dataUrlCache.set(f, e.target.result);
                img.src = e.target.result;
            };
            reader.readAsDataURL(f);
        }
        const btn = document.createElement('button');
        btn.className = 'remove';
        btn.type = 'button';
        btn.title = 'ลบรูปนี้';
        btn.textContent = '×';
        btn.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            removeFile(idx);
        });
        wrap.appendChild(img);
        wrap.appendChild(btn);
        thumbsEl.appendChild(wrap);
    });
    const totalKB = selectedFiles.reduce((a, f) => a + f.size, 0) / 1024;
    filesMeta.textContent = `เลือกไว้ ${selectedFiles.length} รูป · รวม ${totalKB.toFixed(1)} KB`;
    buttonRow.style.display = 'flex';
}

// ===== Reset =====
resetBtn.addEventListener('click', () => {
    selectedFiles = [];
    fileInput.value = '';
    renderThumbs();
    resultsGrid.innerHTML = '';
    resultsHdr.classList.remove('show');
    resultsSum.textContent = '';
    hideError();
});

// ===== Predict =====
predictBtn.addEventListener('click', async () => {
    if (selectedFiles.length === 0) return;
    hideError();
    predictBtn.disabled = true;
    resetBtn.disabled = true;
    predictBtn.innerHTML = '<span class="spinner"></span>กำลังวิเคราะห์...';

    // เคลียร์ผลลัพธ์เก่า + แสดง placeholder card สำหรับแต่ละไฟล์
    resultsGrid.innerHTML = '';
    resultsHdr.classList.add('show');
    resultsSum.textContent = `กำลังประมวลผล ${selectedFiles.length} รูป...`;

    const cardEls = selectedFiles.map(f => createPlaceholderCard(f));
    cardEls.forEach(el => resultsGrid.appendChild(el));

    // ยิงคำขอแบบขนาน
    const results = await Promise.all(
        selectedFiles.map((f, i) => predictOne(f).then(
            data  => ({ ok: true,  index: i, data, file: f }),
            error => ({ ok: false, index: i, error: error.message || String(error), file: f })
        ))
    );

    // เติมผลลัพธ์ลงในแต่ละการ์ด
    let faceCount = 0, noFaceCount = 0, errCount = 0;
    results.forEach(r => {
        const cardEl = cardEls[r.index];
        if (!r.ok) {
            errCount++;
            renderErrorIntoCard(cardEl, r.error);
        } else if (r.data.face_detected === false) {
            noFaceCount++;
            renderNoFaceIntoCard(cardEl, r.data);
        } else {
            faceCount++;
            renderResultIntoCard(cardEl, r.data);
        }
    });

    const summaryParts = [];
    if (faceCount)   summaryParts.push(`พบใบหน้า ${faceCount}`);
    if (noFaceCount) summaryParts.push(`ไม่พบใบหน้า ${noFaceCount}`);
    if (errCount)    summaryParts.push(`ผิดพลาด ${errCount}`);
    resultsSum.textContent = summaryParts.join(' · ');

    predictBtn.disabled = false;
    resetBtn.disabled = false;
    predictBtn.textContent = 'วิเคราะห์อารมณ์';
});

async function predictOne(file) {
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/predict', { method: 'POST', body: formData });
    let data = null;
    try { data = await res.json(); } catch (_) { /* ignore */ }
    if (!res.ok) {
        const msg = (data && (data.detail || data.error)) || `HTTP ${res.status}`;
        throw new Error(msg);
    }
    return data;
}

// ===== Card rendering =====
function createPlaceholderCard(file) {
    const card = document.createElement('div');
    card.className = 'result-card';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'result-img-wrap';
    const img = document.createElement('img');
    if (dataUrlCache.has(file)) {
        img.src = dataUrlCache.get(file);
    } else {
        const reader = new FileReader();
        reader.onload = e => {
            dataUrlCache.set(file, e.target.result);
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
    imgWrap.appendChild(img);

    const body = document.createElement('div');
    body.className = 'result-body';
    body.innerHTML = `
        <div class="result-filename">${escapeHtml(file.name)} (${(file.size/1024).toFixed(1)} KB)</div>
        <div class="status-row" data-role="status">
            <div class="spinner"></div>
            <span>กำลังวิเคราะห์...</span>
        </div>
    `;

    card.appendChild(imgWrap);
    card.appendChild(body);
    return card;
}

function renderResultIntoCard(card, data) {
    const body = card.querySelector('.result-body');
    const status = body.querySelector('[data-role="status"]');
    if (status) status.remove();

    const top = document.createElement('div');
    top.className = 'top-result';
    top.innerHTML = `
        <div class="top-emoji">${EMOJI_MAP[data.predicted_label] || '🎭'}</div>
        <div class="top-label">${escapeHtml(data.predicted_label)}</div>
        <div class="top-confidence">${(data.confidence * 100).toFixed(1)}% confidence</div>
    `;
    body.appendChild(top);

    const scoresWrap = document.createElement('div');
    scoresWrap.className = 'scores';
    scoresWrap.innerHTML = `<h3>คะแนนทั้งหมด</h3>`;
    const list = document.createElement('div');
    data.scores.forEach(s => {
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
            <div class="score-emoji">${EMOJI_MAP[s.label] || '•'}</div>
            <div class="score-label">${escapeHtml(s.label)}</div>
            <div class="score-bar"><div class="score-bar-fill" style="width:${(s.score*100).toFixed(2)}%"></div></div>
            <div class="score-value">${(s.score*100).toFixed(1)}%</div>
        `;
        list.appendChild(row);
    });
    scoresWrap.appendChild(list);
    body.appendChild(scoresWrap);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `
        <span>Total: ${Number(data.total_time_ms).toFixed(1)} ms</span>
        <span>Inference: ${Number(data.inference_time_ms).toFixed(1)} ms</span>
    `;
    body.appendChild(meta);
}

function renderNoFaceIntoCard(card, data) {
    const body = card.querySelector('.result-body');
    const status = body.querySelector('[data-role="status"]');
    if (status) status.remove();

    const top = document.createElement('div');
    top.className = 'top-result no-face';
    top.innerHTML = `
        <div class="top-emoji">❌</div>
        <div class="top-label">Not Emotional Try Again</div>
        <div class="top-confidence">ไม่พบใบหน้าในภาพนี้ — กรุณาอัปโหลดภาพใบหน้าที่ชัดเจน</div>
    `;
    body.appendChild(top);

    if (data && typeof data.total_time_ms === 'number') {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `
            <span>Total: ${Number(data.total_time_ms).toFixed(1)} ms</span>
            <span>Inference: skipped</span>
        `;
        body.appendChild(meta);
    }
}

function renderErrorIntoCard(card, message) {
    const body = card.querySelector('.result-body');
    const status = body.querySelector('[data-role="status"]');
    if (status) status.remove();

    const top = document.createElement('div');
    top.className = 'top-result no-face';
    top.innerHTML = `
        <div class="top-emoji">⚠️</div>
        <div class="top-label">เกิดข้อผิดพลาด</div>
        <div class="top-confidence">${escapeHtml(message || 'Unknown error')}</div>
    `;
    body.appendChild(top);
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
function hideError() { errorMsg.style.display = 'none'; }
</script>
</body>
</html>
