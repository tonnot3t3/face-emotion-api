<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Emotion Classifier</title>
<style>
    :root {
        --bg: #0f172a;
        --card: #1e293b;
        --border: #334155;
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --success: #10b981;
        --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        color: var(--text);
        min-height: 100vh;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .container {
        max-width: 720px;
        width: 100%;
    }
    header { text-align: center; margin-bottom: 32px; }
    header h1 {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
    }
    header p { color: var(--text-muted); font-size: 14px; }
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 16px;
    }
    .dropzone {
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 48px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .dropzone:hover, .dropzone.dragover {
        border-color: var(--primary);
        background: rgba(99, 102, 241, 0.05);
    }
    .dropzone-icon { font-size: 48px; margin-bottom: 12px; }
    .dropzone-text { color: var(--text-muted); font-size: 14px; }
    .dropzone-text strong { color: var(--text); }
    #fileInput { display: none; }
    .preview {
        display: none;
        margin-top: 16px;
        text-align: center;
    }
    .preview img {
        max-width: 100%;
        max-height: 320px;
        border-radius: 12px;
        border: 1px solid var(--border);
    }
    .preview .filename {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-muted);
    }
    .button-row { display: flex; gap: 8px; margin-top: 16px; }
    button {
        flex: 1;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        transition: all 0.15s ease;
        font-family: inherit;
    }
    .btn-primary {
        background: var(--primary);
        color: white;
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
        background: transparent;
        color: var(--text-muted);
        border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
    .result { display: none; }
    .result.show { display: block; }
    .top-result {
        text-align: center;
        padding: 16px;
        background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(192,132,252,0.15) 100%);
        border-radius: 12px;
        margin-bottom: 16px;
    }
    .top-emoji { font-size: 56px; margin-bottom: 8px; }
    .top-label {
        font-size: 24px;
        font-weight: 700;
        text-transform: capitalize;
    }
    .top-confidence {
        color: var(--text-muted);
        margin-top: 4px;
        font-size: 14px;
    }
    .scores h3 {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .score-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
    }
    .score-emoji { font-size: 20px; width: 28px; }
    .score-label {
        width: 80px;
        font-size: 13px;
        text-transform: capitalize;
    }
    .score-bar {
        flex: 1;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
    }
    .score-bar-fill {
        height: 100%;
        background: var(--primary);
        border-radius: 4px;
        transition: width 0.4s ease;
    }
    .score-value {
        font-size: 12px;
        color: var(--text-muted);
        width: 50px;
        text-align: right;
        font-variant-numeric: tabular-nums;
    }
    .meta {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-muted);
    }
    .error-msg {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--error);
        color: var(--error);
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 14px;
        margin-top: 12px;
    }
    .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
        text-align: center;
        margin-top: 24px;
        font-size: 12px;
        color: var(--text-muted);
    }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>🎭 Face Emotion Classifier</h1>
        <p>อัปโหลดรูปใบหน้าเพื่อให้โมเดล ViT ทำนายอารมณ์</p>
    </header>

    <div class="card">
        <label for="fileInput" class="dropzone" id="dropzone">
            <div class="dropzone-icon">📤</div>
            <div class="dropzone-text">
                <strong>คลิกเพื่อเลือกรูป</strong> หรือลากและวางที่นี่<br>
                รองรับ JPG, PNG, WebP (ไม่เกิน 5 MB)
            </div>
        </label>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
        <div class="preview" id="preview">
            <img id="previewImg" alt="Preview">
            <div class="filename" id="filename"></div>
        </div>
        <div class="button-row" id="buttonRow" style="display:none;">
            <button class="btn-secondary" id="resetBtn">รีเซ็ต</button>
            <button class="btn-primary" id="predictBtn">วิเคราะห์อารมณ์</button>
        </div>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="card result" id="result">
        <div class="top-result">
            <div class="top-emoji" id="topEmoji">😊</div>
            <div class="top-label" id="topLabel">happy</div>
            <div class="top-confidence" id="topConfidence">95.2%</div>
        </div>
        <div class="scores">
            <h3>คะแนนทั้งหมด</h3>
            <div id="scoresList"></div>
        </div>
        <div class="meta">
            <span id="metaTotal">Total: -- ms</span>
            <span id="metaInf">Inference: -- ms</span>
        </div>
    </div>

    <footer>
        Powered by ONNX-quantized ViT (<a href="https://huggingface.co/trpakov/vit-face-expression" target="_blank">trpakov/vit-face-expression</a>)<br>
        ดู API docs ที่ <a href="/docs">/docs</a>
    </footer>
</div>

<script>
const EMOJI_MAP = {
    angry: '😠', disgust: '🤢', fear: '😨',
    happy: '😊', neutral: '😐', sad: '😢', surprise: '😲'
};

const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const filenameEl = document.getElementById('filename');
const buttonRow = document.getElementById('buttonRow');
const predictBtn = document.getElementById('predictBtn');
const resetBtn = document.getElementById('resetBtn');
const errorMsg = document.getElementById('errorMsg');
const result = document.getElementById('result');

let currentFile = null;

// Drag & drop
['dragenter', 'dragover'].forEach(evt =>
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); })
);
['dragleave', 'drop'].forEach(evt =>
    dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); })
);
dropzone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        handleFile(e.dataTransfer.files[0]);
    }
});
fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
});

function handleFile(file) {
    hideError();
    result.classList.remove('show');
    currentFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        preview.style.display = 'block';
        filenameEl.textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
        buttonRow.style.display = 'flex';
    };
    reader.readAsDataURL(file);
}

resetBtn.addEventListener('click', () => {
    currentFile = null;
    fileInput.value = '';
    preview.style.display = 'none';
    buttonRow.style.display = 'none';
    result.classList.remove('show');
    hideError();
});

predictBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    hideError();
    predictBtn.disabled = true;
    predictBtn.innerHTML = '<span class="spinner"></span>กำลังวิเคราะห์...';

    const formData = new FormData();
    formData.append('file', currentFile);

    try {
        const res = await fetch('/predict', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) {
            showError(data.detail || data.error || 'เกิดข้อผิดพลาด');
            return;
        }
        renderResult(data);
    } catch (err) {
        showError('Network error: ' + err.message);
    } finally {
        predictBtn.disabled = false;
        predictBtn.textContent = 'วิเคราะห์อารมณ์';
    }
});

function renderResult(data) {
    document.getElementById('topEmoji').textContent = EMOJI_MAP[data.predicted_label] || '🎭';
    document.getElementById('topLabel').textContent = data.predicted_label;
    document.getElementById('topConfidence').textContent =
        (data.confidence * 100).toFixed(1) + '% confidence';

    const list = document.getElementById('scoresList');
    list.innerHTML = '';
    data.scores.forEach(s => {
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
            <div class="score-emoji">${EMOJI_MAP[s.label] || '•'}</div>
            <div class="score-label">${s.label}</div>
            <div class="score-bar"><div class="score-bar-fill" style="width:${s.score*100}%"></div></div>
            <div class="score-value">${(s.score*100).toFixed(1)}%</div>
        `;
        list.appendChild(row);
    });

    document.getElementById('metaTotal').textContent = `Total: ${data.total_time_ms.toFixed(1)} ms`;
    document.getElementById('metaInf').textContent = `Inference: ${data.inference_time_ms.toFixed(1)} ms`;

    result.classList.add('show');
}

function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
function hideError() { errorMsg.style.display = 'none'; }
</script>
</body>
</html>
